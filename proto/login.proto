syntax = "proto3";

// 定义命名空间，生成的 C++ 代码会被包裹在 game::rpc 这个 namespace 下
package game.rpc;

// 【核心设置】告诉 protoc 编译器：帮我生成 C++ 的纯虚基类（RPC 桩）
// 你的 RPC 框架就是要去继承并重写这些虚函数！
option cc_generic_services = true;

// 1. 定义登录请求的数据结构
message LoginRequest 
{
    string username = 1;                                                        // 账号
    string password = 2;                                                        // 密码
}

// 2. 定义登录响应的数据结构
message LoginResponse 
{
    int32 errcode = 1;                                                          // 错误码：0表示成功，非0表示具体的错误类型
    string errmsg = 2;                                                          // 错误信息：例如 "密码错误"、"账号不存在"
    string token = 3;                                                           // 登录凭证：成功后发给客户端，后续请求带上这个证明身份
    int32 user_id = 4;                                                          // 服务器查库返回的用户id
}

message HeartbeatRequest {
    int64 user_id = 1;
    string token = 2;                                                           // 校验合法性，防止别人恶意刷你的接口
}

message HeartbeatResponse {
    bool success = 1;
    int64 server_time = 2;                                                      // 可选：返回服务端时间，方便前端做对齐
}

// 3. 定义服务接口
service LoginService 
{
    rpc Login(LoginRequest) returns(LoginResponse);                             // 处理登录方法
    rpc Heartbeat(HeartbeatRequest) returns(HeartbeatResponse);                 // 心跳保活
}