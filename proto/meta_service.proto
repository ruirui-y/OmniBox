syntax = "proto3";

package omnibox;

option cc_generic_services = true;

// ==============================================================================
// 🧠 逻辑控制面 (MetaService) - 负责虚拟文件树的操作
// ==============================================================================

// ----------------------------------------
// 1. 新建目录 (Create)
// ----------------------------------------
message CreateFolderRequest {
    int64 user_id = 1;          
    int64 parent_id = 2;        
    string folder_name = 3;     
}
message CreateFolderResponse {
    bool success = 1;
    string message = 2;
    int64 new_node_id = 3;      
}

// ----------------------------------------
// 2. 删除节点 (Delete) - 软删除
// ----------------------------------------
message DeleteNodeRequest {
    int64 user_id = 1;          
    int64 node_id = 2;          
}
message DeleteNodeResponse {
    bool success = 1;
    string message = 2;
}

// ----------------------------------------
// 3. 秒传查岗 (Check & Mount)
// ----------------------------------------
message CheckFileRequest {
    int64 user_id = 1;
    int64 parent_id = 2;
    string file_hash = 3;
    string file_name = 4;
    int64 file_size = 5;
}
message CheckFileResponse {
    bool is_exist = 1;      
    string message = 2;     
}

// ----------------------------------------
// 4. 重命名节点 (Rename)
// ----------------------------------------
message RenameNodeRequest {
    int64 user_id = 1;          // 鉴权：只能改自己的
    int64 node_id = 2;          // 要改哪个节点？
    string new_name = 3;        // 新名字叫什么？
}
message RenameNodeResponse {
    bool success = 1;
    string message = 2;
}

// ----------------------------------------
// 5. 移动节点 (Move)
// ----------------------------------------
message MoveNodeRequest {
    int64 user_id = 1;
    int64 node_id = 2;          // 被移动的节点
    int64 target_parent_id = 3; // 要移动到哪个文件夹下？(新的 parent_id)
}
message MoveNodeResponse {
    bool success = 1;
    string message = 2;
}

// ----------------------------------------
// 6. 拉取目录列表 (List) 
// ----------------------------------------
// 用户双击进入某个文件夹时，前端发起的请求
message ListDirectoryRequest {
    int64 user_id = 1;
    int64 parent_id = 2;        // 要看哪个目录下的内容？(根目录传 0)
}

// 单个节点的信息载体 (用于列表展示)
message NodeInfo {
    int64 node_id = 1;
    string node_name = 2;
    bool is_dir = 3;            // 前端需要根据这个决定展示文件夹图标还是文件图标
    int64 file_size = 4;        // 文件大小 (前端好做格式化)
    string update_time = 5;     // 最后修改时间
    string file_hash = 6;       // 如果是文件，带上哈希 (用于后续触发下载逻辑)
}

message ListDirectoryResponse {
    bool success = 1;
    string message = 2;
    repeated NodeInfo nodes = 3; // 这是一个列表！相当于 C++ 里的 std::vector<NodeInfo>
}

// ==============================================================================
// 🚀 定义元数据 RPC 服务
// ==============================================================================
service MetaService {
    rpc CreateFolder(CreateFolderRequest) returns (CreateFolderResponse);
    rpc DeleteNode(DeleteNodeRequest) returns (DeleteNodeResponse);
    rpc CheckFile(CheckFileRequest) returns (CheckFileResponse);
    rpc RenameNode(RenameNodeRequest) returns (RenameNodeResponse);
    rpc MoveNode(MoveNodeRequest) returns (MoveNodeResponse);
    rpc ListDirectory(ListDirectoryRequest) returns (ListDirectoryResponse);
}