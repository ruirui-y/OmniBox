syntax = "proto3";

package omnibox;

// 专门控制不要生成太臃肿的代码
option cc_generic_services = true;

// 1. 文件碎片上传请求
message FileChunkUploadRequest 
{
    // ===================================
    // 逻辑层身份信息 (用于最后合并图纸)
    // ===================================
    string file_hash = 1;                                                       // 整个文件的总哈希 (灵魂标识)
    string file_name = 2;                                                       // 文件名 (虚拟文件树展示用)
    int64 total_size = 3;                                                       // 文件总大小

    // ===================================
    // 物理层切片信息 (用于 TransferServer 散列落盘)
    // ===================================
    string block_hash = 4;                                                      // 这块独立 1MB 肉丁的哈希 (去重的唯一依据！)
    int32 chunk_index = 5;                                                      // 这是第几块？(绝对排位，对应 Mapping 表的 block_order)
    bytes data = 6;                                                             // 真正的碎片实体数据 (纯二进制)
    int64 offset = 7;                                                           // 保留字段：文件级偏移量 (兼容部分老旧下载逻辑)

    // ===================================
    // 控制标志
    // ===================================
    bool is_eof = 8;                                                            // End Of File: 是不是最后一块碎片？
}

// 2. 碎片接收响应
message FileChunkUploadResponse 
{
	bool success = 1;												            // 这块碎片是否成功收到并落盘
	string message = 2;												            // 错误信息或成功提示
    bool is_duplicate = 3;                                                      // 告知网关：这块肉丁是不是触发了“块级秒传”？(即：硬盘里已经有了，根本没写盘)
    int64 next_offset = 4;                                                      // 保留字段 (在前端滑动窗口并发模式下，其实已经用不到它了，前端自己管并发)
}

// 3. 定义文件传输 RPC 服务
service TransferService 
{
	// 流式上传碎片的接口
	rpc UploadChunk(FileChunkUploadRequest) returns (FileChunkUploadResponse);
}